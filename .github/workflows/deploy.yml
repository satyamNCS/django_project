name: Deploy Django SOS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}

    env:
      APP_NAME: SOSDjango
      APP_PORT: 8000
      HEALTH_URL: http://localhost:8000/
      FRONTEND_REPO: satyamNCS/django_project_ui
      FRONTEND_PORT: 4200
      FRONTEND_SERVE_DIR: frontend/dist/ors/browser
      FRONTEND_DEPLOY_DIR: deploy/frontend
      FRONTEND_HEALTH_URL: http://localhost:4200/login

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO }}
          path: frontend

      - name: Verify Python and Node.js
        run: |
          if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
            Write-Host "::error::Python not found on PATH. Install Python 3.10+ on this self-hosted runner."
            exit 1
          }
          if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
            Write-Host "::error::Node.js not found on PATH. Install Node.js 20+ on this self-hosted runner."
            exit 1
          }
          if (-not (Get-Command npm.cmd -ErrorAction SilentlyContinue)) {
            Write-Host "::error::npm.cmd not found on PATH. Install Node.js on this self-hosted runner."
            exit 1
          }
          Write-Host "Python: $(python --version)"
          Write-Host "Node: $(node --version)"
          Write-Host "npm: $(npm.cmd --version)"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django django-cors-headers xhtml2pdf xlwt djangorestframework djangorestframework-simplejwt

      - name: Prepare Django backend
        run: python manage.py migrate --noinput

      - name: Create CI test settings (SQLite only)
        run: |
          @'
          import os
          from SOS_django_projects.settings import *

          DATABASES = {
              "default": {
                  "ENGINE": "django.db.backends.sqlite3",
                  "NAME": os.path.join(BASE_DIR, "test_db.sqlite3"),
              }
          }
          '@ | Out-File -FilePath ci_settings.py -Encoding utf8

      - name: Run Unit Tests
        continue-on-error: true
        run: python manage.py test --settings=ci_settings

      - name: Build Angular
        working-directory: frontend
        run: |
          npm.cmd ci
          npm.cmd run build

      - name: Copy Angular build
        run: |
          if (Test-Path $env:FRONTEND_DEPLOY_DIR) {
            Remove-Item -Recurse -Force $env:FRONTEND_DEPLOY_DIR
          }
          New-Item -ItemType Directory -Path $env:FRONTEND_DEPLOY_DIR -Force | Out-Null
          Copy-Item -Path "$env:FRONTEND_SERVE_DIR\*" -Destination $env:FRONTEND_DEPLOY_DIR -Recurse -Force
          $indexPath = Join-Path $env:FRONTEND_DEPLOY_DIR "index.html"
          if (-not (Test-Path $indexPath)) {
            Write-Host "::error::Angular build missing index.html at $indexPath"
            if (Test-Path $env:FRONTEND_SERVE_DIR) {
              Get-ChildItem $env:FRONTEND_SERVE_DIR -Recurse | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            }
            exit 1
          }
          Write-Host "Angular build copied to $env:FRONTEND_DEPLOY_DIR"

      - name: Install static file server
        run: |
          npm.cmd install serve --no-save
          Write-Host "serve installed for SPA static hosting"

      - name: Restart Django Backend
        run: |
          $workDir = $env:GITHUB_WORKSPACE

          Write-Host "Stopping existing backend (if running)..."
          Get-CimInstance Win32_Process -ErrorAction SilentlyContinue |
            Where-Object { $_.CommandLine -like '*manage.py runserver*' } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 3

          Write-Host "Starting Django application in $workDir ..."
          $backend = Start-Process python `
            -ArgumentList @("manage.py", "runserver", "localhost:$($env:APP_PORT)", "--noreload") `
            -WorkingDirectory $workDir `
            -WindowStyle Hidden `
            -PassThru
          $backend.Id | Out-File -FilePath (Join-Path $workDir "app.pid") -Encoding ascii
          Write-Host "Application started with PID $($backend.Id)"
          Start-Sleep -Seconds 8

      - name: Restart Frontend
        run: |
          $workDir = $env:GITHUB_WORKSPACE
          $deployDir = Join-Path $workDir $env:FRONTEND_DEPLOY_DIR

          Write-Host "Stopping existing frontend (if running)..."
          Get-CimInstance Win32_Process -ErrorAction SilentlyContinue |
            Where-Object {
              $_.CommandLine -like "*$($env:FRONTEND_PORT)*" -and
              ($_.CommandLine -like '*http.server*' -or $_.CommandLine -like '*\serve*')
            } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }
          Start-Sleep -Seconds 3

          Write-Host "Starting Angular frontend from $deployDir ..."
          $servePath = Join-Path $workDir "node_modules\.bin\serve.cmd"
          if (-not (Test-Path $servePath)) {
            Write-Host "::error::serve.cmd not found at $servePath"
            exit 1
          }
          $frontend = Start-Process $servePath `
            -ArgumentList @("-s", $deployDir, "-l", $env:FRONTEND_PORT) `
            -WorkingDirectory $workDir `
            -WindowStyle Hidden `
            -PassThru
          $frontend.Id | Out-File -FilePath (Join-Path $workDir "frontend.pid") -Encoding ascii
          Write-Host "Frontend started with PID $($frontend.Id)"
          Start-Sleep -Seconds 5

      - name: Health Check
        run: |
          $workDir = $env:GITHUB_WORKSPACE

          Write-Host "Waiting for backend to start..."
          $backendOk = $false
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $env:HEALTH_URL -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
                Write-Host "Backend health check passed."
                $backendOk = $true
                break
              }
            } catch {}
            Write-Host "Backend attempt $i/30 - not ready yet..."
            Start-Sleep -Seconds 5
          }
          if (-not $backendOk) {
            Write-Host "Backend health check failed."
            Get-Content (Join-Path $workDir "app.log") -Tail 50 -ErrorAction SilentlyContinue
            Get-Content (Join-Path $workDir "app.err") -Tail 50 -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Host "Waiting for frontend to start..."
          for ($i = 1; $i -le 30; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $env:FRONTEND_HEALTH_URL -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
                Write-Host "Frontend health check passed."
                exit 0
              }
            } catch {}
            Write-Host "Frontend attempt $i/30 - not ready yet..."
            Start-Sleep -Seconds 5
          }
          Write-Host "Frontend health check failed."
          $deployDir = Join-Path $workDir $env:FRONTEND_DEPLOY_DIR
          if (Test-Path $deployDir) {
            Write-Host "Deploy dir contents:"
            Get-ChildItem $deployDir | ForEach-Object { Write-Host $_.Name }
          }
          $pidFile = Join-Path $workDir "frontend.pid"
          if (Test-Path $pidFile) {
            $frontendPid = Get-Content $pidFile -ErrorAction SilentlyContinue
            $proc = Get-Process -Id $frontendPid -ErrorAction SilentlyContinue
            if ($proc) { Write-Host "Frontend process still running (PID $frontendPid)." }
            else { Write-Host "Frontend process not running (PID $frontendPid)." }
          }
          Get-NetTCPConnection -LocalPort $env:FRONTEND_PORT -State Listen -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "Port $($env:FRONTEND_PORT) listener PID: $($_.OwningProcess)" }
          exit 1

      - name: Send Deployment Notification
        if: always()
        run: |
          if ("${{ job.status }}" -eq "success") {
            Write-Host "::notice title=Deployment Successful::Backend on port $env:APP_PORT, frontend on port $env:FRONTEND_PORT"
          } else {
            Write-Host "::error title=Deployment Failed::Deployment failed. Check workflow logs."
          }

      - name: Verify mail secrets
        if: always()
        continue-on-error: true
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MAIL_USERNAME) -or
              [string]::IsNullOrWhiteSpace($env:MAIL_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:NOTIFY_EMAIL)) {
            Write-Host "::error::GitHub Secrets missing. Add MAIL_USERNAME, MAIL_PASSWORD, NOTIFY_EMAIL in repo Settings."
            exit 1
          }
          Write-Host "Mail secrets are configured."

      - name: Send Email Notification
        if: always()
        continue-on-error: true
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $script = @'
          import os, smtplib, ssl
          from email.message import EmailMessage

          user = os.environ["MAIL_USERNAME"].strip()
          password = os.environ["MAIL_PASSWORD"].replace(" ", "").strip()
          to_addr = os.environ["NOTIFY_EMAIL"].strip()
          status = os.environ.get("JOB_STATUS", "unknown")
          run_url = os.environ.get("RUN_URL", "")

          msg = EmailMessage()
          msg["Subject"] = f"Deploy {status} - Django SOS"
          msg["From"] = user
          msg["To"] = to_addr
          msg.set_content(
              f"Hello satyam,\n\n"
              f"Pipeline status: {status}\n\n"
              f"Backend:  http://localhost:8000/\n"
              f"API:      http://localhost:8000/ORSAPI/api/College/\n"
              f"Frontend: http://localhost:4200\n\n"
              f"Run: {run_url}\n"
          )

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=context) as server:
              server.login(user, password)
              server.send_message(msg)
          print("Email sent successfully.")
          '@
          $script | Out-File -FilePath send_mail.py -Encoding utf8
          python send_mail.py
